server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* calls to the backend Container App.
    # This keeps requests same-origin from the browser (no CORS required).
    location /api/ {
        proxy_pass https://meatscout-backend.gentlestone-8cc45036.eastus.azurecontainerapps.io/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host meatscout-backend.gentlestone-8cc45036.eastus.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # React Router — all non-API, non-asset routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
